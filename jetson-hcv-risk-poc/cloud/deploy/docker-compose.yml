services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: hcv
      POSTGRES_PASSWORD: hcv
      POSTGRES_DB: hcv
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hcv -d hcv"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://hcv:hcv@db:5432/hcv
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
