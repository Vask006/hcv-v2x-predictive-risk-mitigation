# Phase 0 — edge defaults (override with EDGE_CONFIG env or --config)

device_id: "edge-dev-001"

# Monotonic + wall clock logging
log_utc: true

camera:
  # OpenCV index (0 = /dev/video0). Run: ls /dev/video*  — needs a plugged-in USB webcam or CSI camera.
  # Linux: user should be in group "video" (sudo usermod -aG video $USER, re-login).
  backend: "opencv"
  index: 0
  # Example for Jetson USB / CSI (uncomment and set backend to gstreamer in code if extended):
  # gstream_pipeline: "nvarguscamerasrc ! ..."

gps:
  # Must match your receiver: run `ls /dev/ttyUSB* /dev/ttyACM*`. USB CDC GPS often uses ttyACM0; FTDI-style uses ttyUSB0.
  # Windows: COM3 etc. Linux user should be in group "dialout".
  port: "/dev/ttyACM0"
  baud: 9600
  timeout_sec: 1.0

phase0:
  frames_to_log: 5
  gps_lines_to_log: 10
  frame_interval_sec: 0.5

# Local recording -> edge/data/recordings/ (relative to edge/). Override with an absolute path if needed.
# Jetson: hcv-record.service runs record_session — one session folder gets camera*.mp4 + gps*.jsonl + session.json.
recording:
  output_base: "data/recordings"
  # JSON lines: probe results and session lifecycle (split so camera and GPS services do not contend on one file).
  connectivity_log_camera: "data/recordings/device_connectivity_camera.jsonl"
  connectivity_log_gps: "data/recordings/device_connectivity_gps.jsonl"
  # Seconds to wait for first parsed NMEA fix (RMC/GGA) before aborting without creating a session folder.
  gps_probe_timeout_sec: 45
  fps: 15
  duration_sec: 0
  # Split camera (mp4) and GPS (jsonl) into multiple files every N seconds (0 = one file each per session). Omitted key defaults to 60s in code.
  segment_duration_sec: 60
  video_filename: "camera.mp4"
  gps_filename: "gps.jsonl"
  session_meta_filename: "session.json"
  # When true: never probe or record GPS (vehicle / bench camera debugging). Same as CLI --no-gps.
  camera_only: false
  # If true: missing GPS port or failed GPS probe (no fix in time) → camera-only instead of aborting.
  # If false: abort when GPS is required but port missing or probe fails (strict vehicle runs).
  gps_optional: true
  # Delete video files (mp4/avi) older than this many days under output_base; used by app.prune_recordings + systemd timer. 0 = never delete.
  retention_days_video: 3

cloud:
  # Used by later phases; ingest base URL for uploader
  ingest_base_url: "http://127.0.0.1:8000"
  api_key: ""

# Phase 1 runtime loop (python -m app.edge_runtime).
phase1_runtime:
  interval_sec: 2.0
  duration_sec: 0
  min_emit_band: "low"
  camera_healthy_age_sec: 20
  perception_mock:
    base_distance_m: 20
    distance_wave_m: 9
    lane_wave: 0.55
    closure_wave_mps: 6
    scenario_speed_multiplier: 1.0

# Synthetic V2X-like context input used for demos until real provider integration.
context_mock:
  base_weather_risk: 0.22
  base_traffic_risk: 0.30
  base_road_risk: 0.18
  risk_wave_amplitude: 0.20
  scenario_speed_multiplier: 1.0

risk_engine:
  # When true (or env HCV_USE_SERVICE_RISK_ENGINE=1), use services/risk-engine via risk_engine/service_adapter.py.
  # On failure, edge_runtime falls back to the legacy dict scorer. Default: off for proven Jetson behavior.
  use_service_adapter: false
  bands:
    low: 0.20
    medium: 0.45
    high: 0.70
    critical: 0.85
  weights:
    proximity: 0.35
    lane_departure: 0.20
    closure_rate: 0.20
    context: 0.20
    gps_penalty: 0.05

uploader:
  enabled: true
  path: "/v1/events"
  timeout_sec: 5.0
  max_batch: 20
