# Phase 0 — edge defaults (override with EDGE_CONFIG env or --config)

device_id: "edge-dev-001"

# Monotonic + wall clock logging
log_utc: true

camera:
  # OpenCV index (0 = /dev/video0). Run: ls /dev/video*  — needs a plugged-in USB webcam or CSI camera.
  # Linux: user should be in group "video" (sudo usermod -aG video $USER, re-login).
  backend: "opencv"
  index: 0
  # Example for Jetson USB / CSI (uncomment and set backend to gstreamer in code if extended):
  # gstream_pipeline: "nvarguscamerasrc ! ..."

gps:
  # Must match your receiver: run `ls /dev/ttyUSB* /dev/ttyACM*` — many USB GPS modules use ttyACM0.
  # Windows: COM3 etc. Linux user should be in group "dialout".
  port: "/dev/ttyUSB0"
  baud: 9600
  timeout_sec: 1.0

phase0:
  frames_to_log: 5
  gps_lines_to_log: 10
  frame_interval_sec: 0.5

# Local recording (python -m app.record_session). Paths under edge/ if relative.
recording:
  output_base: "data/recordings"
  fps: 15
  duration_sec: 0
  video_filename: "camera.mp4"
  gps_filename: "gps.jsonl"
  session_meta_filename: "session.json"
  # Fail fast if GPS serial is missing, instead of silently recording camera-only.
  gps_optional: false

cloud:
  # Used by later phases; ingest base URL for uploader
  ingest_base_url: "http://127.0.0.1:8000"
  api_key: ""

# Phase 1 runtime loop (python -m app.edge_runtime).
phase1_runtime:
  interval_sec: 2.0
  duration_sec: 0
  min_emit_band: "low"
  camera_healthy_age_sec: 20
  perception_mock:
    base_distance_m: 20
    distance_wave_m: 9
    lane_wave: 0.55
    closure_wave_mps: 6
    scenario_speed_multiplier: 1.0

# Synthetic V2X-like context input used for demos until real provider integration.
context_mock:
  base_weather_risk: 0.22
  base_traffic_risk: 0.30
  base_road_risk: 0.18
  risk_wave_amplitude: 0.20
  scenario_speed_multiplier: 1.0

risk_engine:
  bands:
    low: 0.20
    medium: 0.45
    high: 0.70
    critical: 0.85
  weights:
    proximity: 0.35
    lane_departure: 0.20
    closure_rate: 0.20
    context: 0.20
    gps_penalty: 0.05

uploader:
  enabled: true
  path: "/v1/events"
  timeout_sec: 5.0
  max_batch: 20
